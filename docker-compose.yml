version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: clinic-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: mongodb_password
      MONGO_INITDB_DATABASE: clinic
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - clinic-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clinic-app
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://admin:mongodb_password@mongodb:27017/clinic?authSource=admin
    ports:
      - "5000:5000"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - clinic-network
    restart: unless-stopped

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local

networks:
  clinic-network:
    driver: bridge
